<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVA Practice Quiz — LearnDVA</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #fff;
      --text: #111827;
      --muted: #4b5563;
      --accent: #ff9900;
      --accent2: #0073bb;
      --border: #d8dee8;
      --shadow: 0 2px 8px rgba(26, 35, 50, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #fff 0%, #fff8eb 100%);
      border-bottom: 3px solid var(--accent);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      text-align: center;
    }
    header h1 { font-size: 1.6rem; color: #232f3e; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); margin-top: .4rem; }
    main {
      max-width: 720px;
      margin: 2rem auto 3rem;
      padding: 0 1rem;
    }
    .quiz-list { display: flex; flex-direction: column; gap: 1rem; }
    .quiz-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent2);
      border-radius: 10px;
      padding: 1.15rem 1.25rem;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
    }
    .quiz-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(26, 35, 50, 0.12);
    }
    .quiz-card h2 { font-size: 1.1rem; color: #1e3a5f; margin-bottom: .35rem; }
    .quiz-card p { font-size: .92rem; color: var(--muted); }
    .meta {
      margin-top: .6rem;
      font-size: .82rem;
      color: var(--accent2);
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: .72rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 4px;
      margin-right: .35rem;
    }
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: .85rem;
    }
    footer a { color: var(--accent2); }
  </style>
</head>
<body>
  <header>
    <h1>DVA <span>Practice Quiz</span></h1>
    <p>Trắc nghiệm tương tác · 4 đáp án · Giải thích khi chọn</p>
  </header>

  <main>
    <div class="quiz-list" id="quiz-list">
      <!-- Thêm quiz mới: copy block .quiz-card, cập nhật href + nội dung -->
      <a class="quiz-card" href="dynamodb-rcu-wcu.html">
        <span class="badge">DynamoDB</span>
        <h2>RCU / WCU — Tính capacity</h2>
        <p>WCU ceil(KB), RCU strong/eventual, Scan từng item, GSI, TransactWrite, FilterExpression.</p>
        <div class="meta">22 câu · Mở quiz →</div>
      </a>
    </div>
  </main>

  <footer>
    LearnDVA ·
    <a href="../dva-notes.html">← Quay lại ghi chú DVA</a>
  </footer>
</body>
</html>
